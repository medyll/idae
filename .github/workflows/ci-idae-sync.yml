name: CI - idae-sync

on:
  pull_request:
    paths:
      - 'packages/idae-sync/**'
  push:
    branches:
      - main
      - 'idae-sync/**'

jobs:
  test-idae-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run idae-sync tests
        run: pnpm -w -F @medyll/idae-sync test
