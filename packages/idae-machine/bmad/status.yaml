# ── Architecture ──────────────────────────────────────────────────────────────
architecture:
  doc: "bmad/artifacts/docs/ARCH-SCHEMA-FROM-MONGO.md"
  decision: "MongoDB appscheme_* = source of truth. demoScheme = bootstrap only."
  db_naming: "{org}_{base} e.g. test_machine_base"
  offline: "stale-while-revalidate via IDB cache"
  decisions:
    - id: ADR-01
      title: "Pas de classes wrapper par collection système"
      status: pending-refactor
      date: "2026-05-18"
      decision: >
        MachinePrefs, MachineActivity, MachineHistory sont des anti-patterns.
        Ce sont des wrappers statiques sur machine.collection() qui n'apportent rien.
        Tous les schemes ont la même API générique — créer une classe par collection
        système casse le principe schema-driven et réintroduit la rigidité qu'on
        voulait éliminer. Pattern legacy PHP correct : App('agent_pref') = générique.
      consequence: >
        Refactorer à terme: supprimer ces 3 classes, accéder via machine.collection('_prefs')
        directement. Helpers éventuels = fonctions pures standalone, pas des classes.
        MachineRights est le moins mauvais (logique transversale, pas de data) mais
        pourrait aussi devenir un module de fonctions importables.
        machine.prefs / machine.activity / machine.history = DX sugar à supprimer.
      blocked_by: "Sprint 15 release prep en cours — refactor après release"

