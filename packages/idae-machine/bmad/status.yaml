  - id: BL-23
    title: "Field type : source unique = catalogue FieldList (déprécier type inline business models)"
    priority: high
    description: >
      Enquête : bmad/artifacts/investigate-field-type.md. Constat : core (idae-model-core)
      n'inline jamais `type` (fields = {required,readonly}, type via relation appscheme_field_type) ;
      les 21 business models inlinent `type:` sur chaque field (crfr 623, idaenext 492, tactac 479…).
      Pourquoi : (1) BaseFieldDef.type requis (machine-model.ts:23) force l'inline sur tout modèle
      annoté MachineModel ; core échappe via `as const`. (2) publishModel.ts:346 lit fd.type ?? 'text'
      direct, pas FieldList[name].type → inline = source de fait. (3) syncFieldList aspire models→catalogue
      (sens inverse de l'intention). La relation appscheme_field_type (plan core) est court-circuitée.
      Pré-plan de correction phasé :
      P0 ADR source unique = FieldList keyé par code (bmad-adr).
      P1 BaseFieldDef.type → optionnel (S).
      P2 publishModel résout catalogue-first, inline=override (M).
      P3 inverser syncFieldList en vérificateur (M).
      P4 codemod purge `type:` inline 21 models, réconcilier divergences (L).
      P5 tests roundtrip + "aucun field business n'inline type" (S).
      Ordre P0→P1→P2→P3→P5, P4 dernier. ADR candidat = P0.

  - id: BL-24
    title: "Rune partagée useRecordData — résolution data|collectionId factorisée (collectionId = data.id)"
    priority: high
    status: complete
    completed_at: "2026-06-24"
    description: >
      Mécanique dual-source : un composant reçoit soit (collection, collectionId) soit
      (collection, data) ; cas data → collectionId = data.id (ou scheme.index). Aujourd'hui
      implémentée inline dans DataRecord.svelte:48-67 (data ?? machine.store(collection,
      buildWhere(index,id)).records[0]), au-dessus de MachineRecordIdentity (normalizeKey/
      buildWhere/recordMatchesIndex, déjà la primitive bas niveau). Extraire en rune partagée
      useRecordData(() => collection, () => ({ collectionId, data })) → { record, collectionId, scheme }
      réactif, lecture via machine.store (jamais machine.collection — invariant CLAUDE.md 8).
      Adopter dans : DataRecord (remplace l'inline), DataField (ajouter source collectionId, ne
      prend que data aujourd'hui + dérive data?.id ad-hoc DataField.svelte:53), et surtout
      ContextMenuContent.svelte:40 qui RÉIMPLÉMENTE DIVERGENT (records.find(r => r.id ==
      collectionId) : == lâche, ignore scheme.index, non réactif). Autres consommateurs
      collection+collectionId à brancher : Fiche, RecordToolbar (ex-FicheToolbar, cf BL-22),
      Synthesis, ButtonAction. Effort: M. Dépend de rien (BL-22 touche les mêmes fichiers →
      coordonner). Note : aligne le contrat DataRecord documenté dans CLAUDE.md §4.
      Pattern hook déjà établi dans le projet (useViewFields.svelte.ts, useMachinePrefs.svelte.ts)
      → useRecordData suit la même forme `use*().svelte.ts`. Idée connexe (user) : un hook useFieldView
      dans la même famille pour factoriser la résolution de view/champs (aujourd'hui useViewFields
      est consommé inline par DataRecord+DataField) — à étudier en même temps que useRecordData.

