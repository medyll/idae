  - id: QOOLIE-SWR
    title: "qoolie: transparent SWR fetch on cold IDB read (cross-project feature)"
    priority: high
    project: "qoolie"
    description: >
      CROSS-PROJECT FEATURE — must be implemented inside @medyll/qoolie, not in idae-machine.
      idae-machine is the first consumer hit by the gap; idae-machine memo + this entry exist so
      the requirement does not get lost when work shifts to the qoolie package.

      Problem statement
      -----------------
      qoolie currently treats reads as pure local (IDB or in-memory state). On a cold IDB the
      collection is empty and stays empty unless:
        (a) the application code writes locally (outbox round-trips an echo back), or
        (b) the server pushes via ServerPushListener (SSE/WS, requires the server to emit), or
        (c) the host application performs a manual fetch + qoolie.create loop (= the hack we
            just removed from idae-machine).

      This makes server-first deployments unusable for read-mostly UIs: any DataList bound to a
      collection that the local client has never written to displays nothing on first session,
      even though the data exists in MongoDB and the server endpoint is reachable.

      Design — Option B (validated 2026-05-24)
      -----------------------------------------
      Add a transparent SWR layer to qoolie itself. The host code (idae-machine, any other
      consumer) keeps calling collection.where / getAll / get as today. qoolie internally:

        1. Resolves the call against local IDB / state immediately (current behavior).
        2. On the FIRST read of a collection in the session, fires a background pull against
           the configured deliverer (sync.databaseHost) and writes the records into IDB using
           a silent upsert (no outbox re-emit, no event amplification — see idbCollection
           {silent:true} that already exists).
        3. When the pull resolves, idbEventBus emits its normal 'change' event → reactive
           consumers (Svelte / React / Vue adapters) re-render with the hydrated data.
        4. A per-collection guard (Set<string>) prevents refetch loops. An explicit
           `collection.revalidate()` method can re-trigger the pull when freshness is required.

      The hook MUST be native to qoolie (NOT an external callback declared by the host). Host
      code should not need to wire anything — passing sync.databaseHost in the QoolieOptions is
      enough for the SWR behavior to kick in.

      Suggested API surface
      ---------------------
        // Existing reads now transparently SWR
        const rows = collection.getAll();          // returns local now, hydrates in background
        const v    = collection.where({ ... });    // same

        // Explicit re-fetch when freshness matters (refresh button, focus revalidate, etc.)
        await collection.revalidate();             // forces a server pull, awaits completion

        // Optional opt-out (read-only collections that should never auto-pull)
        collections: { logs: { keyPath: 'id', autoHydrate: false } }

        // Optional hook for telemetry / spinners
        hooks: {
          onColdRead?: (collection: string) => void;
          onHydrated?: (collection: string, count: number) => void;
          onHydrateError?: (collection: string, err: Error) => void;
        }

      Implementation sketch
      ---------------------
        - SyncController (or a new HydrationController) owns:
            - a `Set<string>` of collections already hydrated this session
            - a `pull(collectionName)` method that calls the deliverer (GET /api/data/{name}),
              normalizes the response, and silently upserts into IdbCollection.
        - QoolieCollection.getAll/where/get call `controller.ensure(name)` (fire-and-forget)
          before returning the local result. ensure() de-duplicates concurrent calls.
        - Silent upsert path: extend QoolieCollection or IdbCollection to expose a
          `bulkUpsertSilent(records)` helper that writes via IdbCollection internals without
          firing outbox events but DOES fire idbEventBus 'change' so reactive layers re-render.
        - Pull endpoint convention: `${baseUrl}/api/data/${collection}` with optional
          ?limit=&since= query — qoolie can decide cursor strategy later.
        - Auth/tenant headers already configured on the deliverer (SyncController.setToken,
          setHeaders, setTenantId) — reuse them, do NOT duplicate auth wiring in qoolie.

      Edge cases / decisions
      ----------------------
        - What if the deliverer is not configured (no sync at all)? autoHydrate is a no-op,
          reads stay 100% local. No behavior change vs today.
        - What about pagination on huge collections? v1: full pull capped at server's default
          limit. v2: cursor-based hydration triggered by paginated reads.
        - What about per-record granularity (collection.get(id) on a record never seen)? v1:
          first .get() triggers the full-collection pull (same hydration). v2: optional
          per-id fetch (GET /api/data/{name}/{id}) if the collection is huge.
        - What about staleness? `revalidate()` is the explicit knob. Optional auto-revalidate
          on window focus / interval is a v2 concern.
        - Conflict with optimistic local writes during hydration? Silent upsert must skip
          records present in IDB with a newer local mtime (or always defer to local, since
          outbox will reconcile).

      Acceptance (qoolie-side)
      ------------------------
        - With sync.databaseHost set and a fresh IDB, the first read of any collection
          transparently pulls the server records and the reactive consumer re-renders.
        - Per-session deduplication: subsequent reads on the same collection do not re-pull.
        - revalidate() works as an explicit refresh.
        - Existing tests in qoolie still pass (no behavior change when sync is disabled).
        - New tests cover: cold-IDB lazy pull, dedup, revalidate, autoHydrate:false opt-out,
          error path (server 401/500 — do not throw on reads, surface via onHydrateError).

      Acceptance (idae-machine-side, closes BACK-03)
      ----------------------------------------------
        - machine.ts no longer contains any _pullFromServer / manual GET loop. It already does
          not, as of this session — keep it that way.
        - <DataList collection="appscheme"> on a fresh IDB renders the MongoDB rows.
        - Same for every other core/business collection.
        - No 429 storm on boot.

      Out of scope
      ------------
        - Server-side endpoint design changes (qoolie consumes the existing /api/data/:name).
        - idae-sync outbox modifications (SWR is a read path; outbox stays write-only).
        - ServerPush wiring (orthogonal; can coexist — push delivers deltas after the initial
          SWR pull).

# ── Notes ─────────────────────────────────────────────────────────────────────
# 2026-05-24 — Architectural correction
#   machine.ts cleanup: removed _pullFromServer, _fetchSchemaBg, _refreshSchemaInBackground.
#   Single async entry point: machine.boot(). start()/fetchSchema() = deprecated shims.
#   Lesson recorded in user-memory feedback_no_organic_methods.md: symptom-driven private
