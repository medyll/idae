# ── Architecture ──────────────────────────────────────────────────────────────
architecture:
  doc: "bmad/artifacts/docs/ARCH-SCHEMA-FROM-MONGO.md"
  decision: "MongoDB appscheme_* = source of truth. demoScheme = bootstrap only."
  db_naming: "{org}_{base} e.g. test_machine_base"
  offline: "stale-while-revalidate via IDB cache"
  decisions:
    - id: ADR-01
      title: "Pas de classes wrapper par collection système"
      status: done
      decision: "Accès direct via machine.collection(name) + helpers inline. MachineRights conservé (logique transversale checkAccess uniquement)."

    - id: ADR-02
      title: "machine.store(name) = reactive | machine.collection(name) = imperative"
      status: implemented
      decision: >
        store(name) → wraps useQoolieCollection() → { items: T[] } — pour composants Svelte.
        collection(name) → raw QoolieCollection — pour CRUD, seed, tests.
        Machine re-expose qoolie, ne le duplique pas. reactiveStore.svelte.ts supprimé.

    - id: ADR-03
      title: "DataList autonome par défaut, children optionnel"
      status: decided
      decision: >
        children?: Snippet optionnel. Rendu par défaut = DataFields sur template.presentation.
        Fallbacks: empty (texte "—"), groupHeader (clé brute). DataList importe DataFields.

    - id: ADR-04
      title: "DataList link parser — CollectionNav supprimé"
      status: implemented
      decision: >
        DataList props: `link` (string), `linkVars` (Record<string,any>, optionnel), `linkCollectionField` (string, optionnel).
        Format link : "action:module" ou "action:module@zone" — zone optionnelle, défaut 'main'.
        action = 'loadFrame' | 'loadIn'. module = modulePath (ex: 'explorer'). zone = data-target-zone.
        indexField = constante 'id' (chaque collection a obligatoirement id + code).
        Deux modes navigate():
          - linkCollectionField fourni → navCollection = record[linkCollectionField] (ex: appscheme sidebar avec linkCollectionField="code"), navId = undefined.
          - Sans linkCollectionField → navCollection = collection prop, navId = String(record.id).
        Navigation via machine.framer.loadFrame() / machine.framer.loadIn() (machine.loadFrame @deprecated).
        CollectionNav.svelte supprimé. Explorer.svelte :
        `<DataList collection="appscheme" {sortBy} link="loadFrame:explorer" linkCollectionField="code" />`.
        Fichier : src/lib/main/frame/linkParser.ts — parseLink(str) pur, sans I/O.
        Signature : parseLink(link: string) => { action: string; module: string; zone: string } | null.
        Tests : linkParser.test.ts (7 tests) + dataListNavigate.test.ts (6 tests).
        frameUrl.ts extrait de machine.ts pour éviter import circulaire avec MachineFrameManager.

    - id: ADR-05
      title: "DataList control props — ordre sémantique showControlX"
      status: decided
      decision: >
        Pour les props d'affichage des contrôles UI de DataList, adopter l'ordre sémantique
        `showControlX` au lieu de `showXControl` ou `enableX`.
        Exemples cibles : `showControlSort`, `showControlGroup`, `showControlFind`,
        `showControlMode`. Cette famille nomme uniquement la visibilité des widgets UI.
        Les props métier / état restent séparées : `sortBy`, `groupBy`, `where`, `mode`.
        But : éviter l'ambiguïté entre état appliqué à la liste et affichage des contrôles,
        tout en gardant un naming stable et lisible pour humains et LLMs.

    - id: ADR-06
      title: "DataList mode unification — svelte:element + DataRecord mode='row'"
      status: implemented
      decision: >
        Unifier les 3 modes de DataList (list/table/grid) sur un pipeline DataRecord unique.
        Supprimer TableInline.svelte (scheme-aveugle, colonnes Object.keys, FK brutes).
        Architecture cible (rectifiée S43-01) :
          - DataList ne boucle JAMAIS sur les fields directement.
          - DataRecord est le seul composant autorisé à itérer les champs d'un record.
          - DataRecord mode='row' : émet <td><DataField/></td> par field, sans wrapper.
          - renderItem snippet utilise <svelte:element this={currentMode==='table'?'tr':'li'}>.
          - table tbody : <DataRecord mode="row"> — pas de loop DataField dans DataList.
          - tableColumns $derived conservé pour <thead> uniquement (labels colonnes).
          - container <table> vs <ul> : {#if mode==='table'} — svelte:element non adapté
            (structure thead/tbody trop différente de ul/li).
          - grid mode reste séparé (panel + button wrapper, structure incompatible).
          - <thead> statique conditionnel {#if mode === 'table'}, labels depuis tableColumns.
          - Snippet item non supporté en table mode. Documenter explicitement.
          - Styles dans src/styles/components.css @layer components (déjà fait S42-01).
        S42-01 : TableInline supprimé ✅, styles migrés ✅, mais DataField loop direct ❌.
        S43-01 : fix architectural — DataRecord mode='row' + svelte:element renderItem.
        Ref stories: S42-01 (partiel), S43-01 (fix).

