          - "POST /api/auth/login {login:'user',password:'user123'} → 200 + token JWT"
          - "POST /api/auth/login {login:'bad',password:'bad'} → 401"
          - "GET /api/data/vehicle sans Authorization → 401"
          - "GET /api/data/vehicle avec token admin → 200"
          - "Token JWT contient userId et org (décodable sans secret)"
          - "viewer (groupe uniquement, R+L) peut lire mais pas créer"
        files_to_create:
