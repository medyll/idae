      - id: S35-01
        title: "HydrationController — owns per-session hydrated Set + pull(name) + ensure(name)"
        status: planned
        effort: M
        detail: >
          New class qoolie/src/lib/HydrationController.ts.
          - hydrated: Set<string> — collections already pulled this session.
          - pull(name): calls deliverer GET /api/data/{name}, normalizes { data: [] } response,
            calls IdbCollection.bulkUpsertSilent(records) (see S35-03). Fires no outbox events.
          - ensure(name): if name in hydrated → no-op. If pull in-flight → return same promise
            (dedup). Else → add to hydrated, fire pull() as background (void). Never throws on
            read path — errors surface via onHydrateError hook only.
          - Receives deliverer ref + hooks config from Qoolie constructor.
          - Only active when syncConfig.databaseHost is set. No-op otherwise.
        tests_executed: false
