# ── Architecture ──────────────────────────────────────────────────────────────
architecture:
  doc: "bmad/artifacts/docs/ARCH-SCHEMA-FROM-MONGO.md"
  decision: "MongoDB appscheme_* = source of truth. demoScheme = bootstrap only."
  db_naming: "{org}_{base} e.g. test_machine_base"
  offline: "stale-while-revalidate via IDB cache"
  decisions:
    - id: ADR-01
      title: "Pas de classes wrapper par collection système"
      status: done
      date: "2026-05-18"
      resolved: "2026-05-18"
      decision: >
        MachinePrefs, MachineActivity, MachineHistory ne seront pas des classes wrapper.
        Accès direct via machine.collection('_prefs'|'_activity'|'_history') + helpers inline.
        Pattern appliqué dès S13: les tests documentent les conventions de data shape et query.
      consequence: >
        MachineRights conservé (logique transversale checkAccess, pas du data).
        Aucun refactor nécessaire — les wrapper classes n'ont jamais été implémentées.
        machine.prefs / machine.activity / machine.history n'existent pas sur Machine class.

