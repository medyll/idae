          reactiveStore.svelte.ts deleted) but never formally closed with passing tests.

          Checklist:
            1. machine.ts: store(name) calls useQoolieCollection(this._qoolie, name). Verify signature
               matches — returns { items: T[] }, called as function (not getter). DONE in source.
            2. reactiveStore.svelte.ts: confirm deleted (Test-Path = False). DONE.
