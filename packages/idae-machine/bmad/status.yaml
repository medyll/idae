# ── Architecture ──────────────────────────────────────────────────────────────
architecture:
  doc: "bmad/artifacts/docs/ARCH-SCHEMA-FROM-MONGO.md"
  decision: "MongoDB appscheme_* = source of truth. demoScheme = bootstrap only."
  db_naming: "{org}_{base} e.g. test_machine_base"
  offline: "stale-while-revalidate via IDB cache"
  decisions:
    - id: ADR-01
      title: "Pas de classes wrapper par collection système"
      status: done
      decision: "Accès direct via machine.collection(name) + helpers inline. MachineRights conservé (logique transversale checkAccess uniquement)."

    - id: ADR-02
      title: "machine.store(name) = reactive | machine.collection(name) = imperative"
      status: implemented
      decision: >
        store(name) → wraps useQoolieCollection() → { items: T[] } — pour composants Svelte.
        collection(name) → raw QoolieCollection — pour CRUD, seed, tests.
        Machine re-expose qoolie, ne le duplique pas. reactiveStore.svelte.ts supprimé.

    - id: ADR-03
      title: "DataList autonome par défaut, children optionnel"
      status: decided
      decision: >
        children?: Snippet optionnel. Rendu par défaut = DataFields sur template.presentation.
        Fallbacks: empty (texte "—"), groupHeader (clé brute). DataList importe DataFields.

    - id: ADR-04
      title: "DataList link parser — CollectionNav supprimé"
      status: implemented
      decision: >
        DataList props: `link` (string), `linkVars` (Record<string,any>, optionnel), `linkCollectionField` (string, optionnel).
        Format link : "action:module" ou "action:module@zone" — zone optionnelle, défaut 'main'.
        action = 'loadFrame' | 'loadIn'. module = modulePath (ex: 'explorer'). zone = data-target-zone.
        indexField = constante 'id' (chaque collection a obligatoirement id + code).
        Deux modes navigate():
          - linkCollectionField fourni → navCollection = record[linkCollectionField] (ex: appscheme sidebar avec linkCollectionField="code"), navId = undefined.
          - Sans linkCollectionField → navCollection = collection prop, navId = String(record.id).
        Navigation via machine.framer.loadFrame() / machine.framer.loadIn() (machine.loadFrame @deprecated).
        CollectionNav.svelte supprimé. Explorer.svelte :
        `<DataList collection="appscheme" {sortBy} link="loadFrame:explorer" linkCollectionField="code" />`.
        Fichier : src/lib/main/frame/linkParser.ts — parseLink(str) pur, sans I/O.
        Signature : parseLink(link: string) => { action: string; module: string; zone: string } | null.
        Tests : linkParser.test.ts (7 tests) + dataListNavigate.test.ts (6 tests).
        frameUrl.ts extrait de machine.ts pour éviter import circulaire avec MachineFrameManager.

