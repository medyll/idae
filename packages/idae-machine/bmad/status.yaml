          corresponding data field via `findFkField`, builds `where` filter, renders one DataList
          per FK target with `showToolbar={false}` and `usePrefs={false}`. Handles `multiple:true`
          via `$in` operator. Three states: loading / found / absent (avoids false-negative
          "Record non found" during live-query hydration). Implemented via shared relation
          resolver utility and explicit unresolved-relation messages instead of silent skips.
