# в”Ђв”Ђ Architecture в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
architecture:
  doc: "bmad/artifacts/docs/ARCH-SCHEMA-FROM-MONGO.md"
  decision: "MongoDB appscheme_* = source of truth. demoScheme = bootstrap only."
  db_naming: "{org}_{base} e.g. test_machine_base"
  offline: "stale-while-revalidate via IDB cache"
  decisions:
    - id: ADR-01
      title: "Pas de classes wrapper par collection systГЁme"
      status: done
      decision: "AccГЁs direct via machine.collection(name) + helpers inline. MachineRights conservГ© (logique transversale checkAccess uniquement)."

    - id: ADR-02
      title: "machine.store(name) = reactive | machine.collection(name) = imperative"
      status: implemented
      decision: >
        store(name) в†’ wraps useQoolieCollection() в†’ { items: T[] } вЂ” pour composants Svelte.
        collection(name) в†’ raw QoolieCollection вЂ” pour CRUD, seed, tests.
        Machine re-expose qoolie, ne le duplique pas. reactiveStore.svelte.ts supprimГ©.

    - id: ADR-03
      title: "DataList autonome par dГ©faut, children optionnel"
      status: decided
      decision: >
        children?: Snippet optionnel. Rendu par dГ©faut = DataFields sur template.presentation.
        Fallbacks: empty (texte "вЂ”"), groupHeader (clГ© brute). DataList importe DataFields.

    - id: ADR-04
      title: "DataList link parser вЂ” CollectionNav supprimГ©"
      status: implemented
      decision: >
        DataList props: `link` (string), `linkVars` (Record<string,any>, optionnel), `linkCollectionField` (string, optionnel).
        Format link : "action:module" ou "action:module@zone" вЂ” zone optionnelle, dГ©faut 'main'.
        action = 'loadFrame' | 'loadIn'. module = modulePath (ex: 'explorer'). zone = data-target-zone.
        indexField = constante 'id' (chaque collection a obligatoirement id + code).
        Deux modes navigate():
          - linkCollectionField fourni в†’ navCollection = record[linkCollectionField] (ex: appscheme sidebar avec linkCollectionField="code"), navId = undefined.
          - Sans linkCollectionField в†’ navCollection = collection prop, navId = String(record.id).
        Navigation via machine.framer.loadFrame() / machine.framer.loadIn() (machine.loadFrame @deprecated).
        CollectionNav.svelte supprimГ©. Explorer.svelte :
        `<DataList collection="appscheme" {sortBy} link="loadFrame:explorer" linkCollectionField="code" />`.
        Fichier : src/lib/main/frame/linkParser.ts вЂ” parseLink(str) pur, sans I/O.
        Signature : parseLink(link: string) => { action: string; module: string; zone: string } | null.
        Tests : linkParser.test.ts (7 tests) + dataListNavigate.test.ts (6 tests).
        frameUrl.ts extrait de machine.ts pour Г©viter import circulaire avec MachineFrameManager.

    - id: ADR-05
      title: "DataList control props вЂ” ordre sГ©mantique showControlX"
      status: decided
      decision: >
        Pour les props d'affichage des contrГґles UI de DataList, adopter l'ordre sГ©mantique
        `showControlX` au lieu de `showXControl` ou `enableX`.
        Exemples cibles : `showControlSort`, `showControlGroup`, `showControlFind`,
        `showControlMode`. Cette famille nomme uniquement la visibilitГ© des widgets UI.
        Les props mГ©tier / Г©tat restent sГ©parГ©es : `sortBy`, `groupBy`, `where`, `mode`.
        But : Г©viter l'ambiguГЇtГ© entre Г©tat appliquГ© Г  la liste et affichage des contrГґles,
        tout en gardant un naming stable et lisible pour humains et LLMs.

    - id: ADR-06
      title: "DataList mode unification вЂ” svelte:element + DataRecord mode='row'"
      status: implemented
      decision: >
        Unifier les 3 modes de DataList (list/table/grid) sur un pipeline DataRecord unique.
        Supprimer TableInline.svelte (scheme-aveugle, colonnes Object.keys, FK brutes).
        Architecture cible (rectifiГ©e S43-01) :
          - DataList ne boucle JAMAIS sur les fields directement.
          - DataRecord est le seul composant autorisГ© Г  itГ©rer les champs d'un record.
          - DataRecord mode='row' : Г©met <td><DataField/></td> par field, sans wrapper.
          - renderItem snippet utilise <svelte:element this={currentMode==='table'?'tr':'li'}>.
          - table tbody : <DataRecord mode="row"> вЂ” pas de loop DataField dans DataList.
          - tableColumns $derived conservГ© pour <thead> uniquement (labels colonnes).
          - container <table> vs <ul> : {#if mode==='table'} вЂ” svelte:element non adaptГ©
            (structure thead/tbody trop diffГ©rente de ul/li).
          - grid mode reste sГ©parГ© (panel + button wrapper, structure incompatible).
          - <thead> statique conditionnel {#if mode === 'table'}, labels depuis tableColumns.
          - Snippet item non supportГ© en table mode. Documenter explicitement.
          - Styles dans src/styles/components.css @layer components (dГ©jГ  fait S42-01).
        S42-01 : TableInline supprimГ© вњ…, styles migrГ©s вњ…, mais DataField loop direct вќЊ.
        S43-01 : fix architectural вЂ” DataRecord mode='row' + svelte:element renderItem.
        Ref stories: S42-01 (partiel), S43-01 (fix).

