# ── Architecture ──────────────────────────────────────────────────────────────
architecture:
  doc: "bmad/artifacts/docs/ARCH-SCHEMA-FROM-MONGO.md"
  decision: "MongoDB appscheme_* = source of truth. demoScheme = bootstrap only."
  db_naming: "{org}_{base} e.g. test_machine_base"
  offline: "stale-while-revalidate via IDB cache"
  decisions:
    - id: ADR-01
      title: "Pas de classes wrapper par collection système"
      status: done
      date: "2026-05-18"
      resolved: "2026-05-18"
      decision: >
        MachinePrefs, MachineActivity, MachineHistory ne seront pas des classes wrapper.
        Accès direct via machine.collection('_prefs'|'_activity'|'_history') + helpers inline.
        Pattern appliqué dès S13: les tests documentent les conventions de data shape et query.
      consequence: >
        MachineRights conservé (logique transversale checkAccess, pas du data).
        Aucun refactor nécessaire — les wrapper classes n'ont jamais été implémentées.
        machine.prefs / machine.activity / machine.history n'existent pas sur Machine class.

    - id: ADR-02
      title: "machine.store(name) vs machine.collection(name) — reactive vs imperative access"
      status: implemented
      date: "2026-05-24"
      context: >
        In-app components need reactive access to collection data (Svelte 5 $state / $effect).
        machine.store[name] (getter returning a Proxy) was used as a workaround, but it duplicated
        useQoolieCollection logic from @medyll/qoolie/svelte inside idae-machine's
        reactiveStore.svelte.ts. This ran for 5 days without the real problem being identified.
        Additionally, using a getter (.store[name]) prevents function-call syntax which is cleaner
        for dynamic collection names in UI code.
      decision: >
        TWO distinct access patterns, different purposes, different names:

        machine.store(name)
          — function call (not a getter), returns reactive { items: T[] }
          — wraps useQoolieCollection(this._qoolie, name) from @medyll/qoolie/svelte
          — for Svelte components that need live-updating collections
          — example: const { items } = machine.store('vehicle')

        machine.collection(name)
          — raw imperative QoolieCollection (existing API, already at machine.ts:~348)
          — for non-reactive use: CRUD ops, seed, server checks, tests
          — example: await machine.collection('vehicle').create(record)

        Principle: machine = only object. It re-exports qoolie capabilities, it does NOT
        duplicate them. The reactive layer belongs to qoolie (useQoolieCollection); machine
        surfaces it through a thin wrapper so consumers never import from qoolie directly.
      consequence: >
        - Delete src/lib/main/reactiveStore.svelte.ts — was a hand-rolled duplicate of
          useQoolieCollection. Any consumer using the old Proxy pattern migrates to machine.store().
        - Remove schemaVersion reactivity band-aid (was a symptom of async timing not owned
          by a single entry point — resolved by machine.boot() cleanup this session).
        - DataList.svelte and other UI consumers that previously used machine.store[name]
          switch to machine.store(name) function call. API shape unchanged ({ items }).
        - machine.store(name) is defined on Machine class using Svelte 5 runes context —
          must be called inside a Svelte component or $effect scope (same constraint as
          useQoolieCollection — this is documented, not a regression).
        - machine.collection(name) stays as-is. Both coexist permanently — different roles.
      related: ["BACK-03", "QOOLIE-SWR", "feedback_no_organic_methods"]

    - id: ADR-03
      title: "DataList — autonome par défaut, children optionnel"
      status: decided
      date: "2026-05-25"
      context: >
        Sprint S32 (commit a71edffa) a remplacé le snippet `children` unique par des snippets
        nommés `item`/`groupHeader`/`empty`/`footer`, en rendant `item` REQUIRED. Résultat:
        DataList ne peut plus s'afficher sans snippet fourni par le consumer. Non sollicité.
        Enquête git: DataFields n'a jamais été dans DataList dans aucun commit historique.
        La vision autonome est nouvelle mais architecturalement correcte.
      decision: >
        DataList doit être autonome pour l'affichage ET permettre l'override via snippets.

        1. Revenir au pattern `children` (un seul snippet, reçoit tout en bloc):
              children?: Snippet<[{ items, index, fieldValues, pagination, groups }]>
           children est OPTIONNEL (pas required).

        2. Rendu par défaut quand children absent:
           - Pour chaque record: DataFields(collection, data=record, showFields=presentationFields)
           - presentationFields = template.presentation.split(' ') du schéma de la collection
           - Si template.presentation absent: tous les champs (DataFields sans showFields)
           - Wrappé dans <li> standard dans une <ul>

        3. Fallbacks optionnels supplémentaires (tous optionnels):
           - empty?: Snippet | texte "—" par défaut si aucun enregistrement
           - groupHeader?: Snippet | clé brute du groupe par défaut

        Principe: DataList = boîte noire de données + rendu schema-driven par défaut.
        Consumer fournit children uniquement pour override complet du rendu.
      consequence: >
        - DataList importe DataFields — seule dépendance ajoutée dans data-ui/
        - `<DataList collection="vehicle" />` affiche les champs de template.presentation sans snippet
        - Consumers existants (Explorer, CollectionNav, Pane) migrent: item+groupHeader+empty+footer
          → un seul snippet children qui reçoit {items, index, fieldValues, pagination, groups}
        - Cohérence: même stack de rendu (FieldDisplay → Input* atoms) partout
        - template.presentation = "vue liste" implicite — champs à afficher en mode list
      related: ["ADR-02", "S32"]

