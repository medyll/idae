  - id: 40
    goal: "DataListFk & DataListRfk вЂ” schema-driven FK/RFK data viewers"
    status: completed
    stories:
      - id: S40-01
        title: "DataList opt-out prefs вЂ” prop usePrefs/prefsScope to disable user-prefs hydration"
        status: complete
        effort: S
        tests_executed: true
        test_output: "DataRelations.svelte.test.ts proves usePrefs=false bypasses persisted finder prefs and prefsScope isolates lookup scope."
        test_result: pass
        detail: >
          Prerequisite for DataListFk/Rfk correctness. DataList AND-merges consumer `where` with
          persisted user finder prefs (`appuser_prefs`, scope `datalist.{collection}`). This causes
          FK-filtered records to disappear if the user has an active finder on the target collection.
          Add `usePrefs?: boolean` (default true) or `prefsScope?: string` override to DataList.
          When `usePrefs={false}`, skip hydration of userSortBy/userGroupBy/userFindWhere from
          appuser_prefs and do not persist runtime changes. Implemented with proxy-safe pref
          normalization before IndexedDB persistence so Svelte $state arrays/objects no longer
          trigger DataCloneError in client tests.
      - id: S40-02
        title: "MachineScheme.findFkField + parseReverseFkFields вЂ” schema helpers"
        status: complete
        effort: S
        tests_executed: true
        test_output: "machineRelationHelpers.test.ts: findFkField + parseReverseFkFields covered."
        test_result: pass
        detail: >
          Add `findFkField(targetCollection: string)` to MachineScheme.ts: scans `fields`, parses
          each field via `field(name).parse()`, returns `{ fieldName, targetIndex }` where
          `fieldType` matches `fk-{targetCollection}.{targetIndex}`. O(n) per call, negligible.
          Add `parseReverseFkFields()`: wraps existing `parseReverseFks()` and enriches each entry
          with the source-side `fieldName` via `findFkField(sourceCollection, this.collection)`.
          Both methods are pure (no I/O). Update MachineScheme tests.
      - id: S40-03
        title: "DataListFk.svelte вЂ” forward FK data viewer"
        status: complete
        effort: M
        tests_executed: true
        test_output: "DataRelations.svelte.test.ts: forward relation render + fk filter + prefs isolation pass."
        test_result: pass
        detail: >
          Wrapper around DataList. Props: `collection`, `recordId?`, `data?`, `fk?`, `showTitle?`,
          forward DataList props. Resolves FK definitions from schema, maps each FK to the
          corresponding data field via `findFkField`, builds `where` filter, renders one DataList
          per FK target with `showToolbar={false}` and `usePrefs={false}`. Handles `multiple:true`
