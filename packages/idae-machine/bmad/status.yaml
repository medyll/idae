          - "machine.start() avec demoScheme + fake-indexeddb — zéro erreur"
          - "machine.collection('category').create({code:'x',name:'X'}) retourne doc avec id"
          - "machine.collection('category').getAll() retourne le doc créé"
          - "machine.collection('vehicle').where({status:'available'}) filtre correctement"
          - "machine.collection('category').update(id, {name:'Y'}) retourne doc modifié"
          - "machine.collection('category').delete(id) retourne true, getAll() ne le contient plus"
          - "machine.collection('vehicle').count() retourne entier correct"
          - "machine.collection('nonexistent') throw MachineError"
          - "6 collections testées: vehicle, category, customer, rental, location_office, maintenance"
        files_to_create:
